<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>NOL Noti</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 200px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fff;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .title { font-size: 16px; font-weight: 600; color: #1E293B; }
    .status {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 4px;
    }
    .status.on { background: #D1FAE5; color: #065F46; }
    .status.off { background: #FEE2E2; color: #991B1B; }
    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 0;
    }
    .toggle-btn {
      width: 80px;
      height: 40px;
      border-radius: 20px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    .toggle-btn.on {
      background: #10B981;
      color: #fff;
    }
    .toggle-btn.off {
      background: #EF4444;
      color: #fff;
    }
    .info {
      font-size: 12px;
      color: #64748B;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="title">NOL Noti</span>
    <span class="status" id="status">开启中</span>
  </div>
  <div class="toggle-container">
    <button class="toggle-btn on" id="toggleBtn">关闭</button>
  </div>
  <p class="info">悬浮窗已在页面显示</p>
  <script src="popup.js"></script>
</body>
</html>
